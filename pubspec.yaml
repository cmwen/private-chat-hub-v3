name: private_chat_hub
description: "Private Chat Hub - Universal AI chat platform for local, self-hosted, and cloud AI providers."
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dio: ^5.8.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_markdown: ^0.7.6+2
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.4
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_foreground: assets/icon/app_icon.png
  adaptive_icon_background: "#6750A4"
