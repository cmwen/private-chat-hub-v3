name: private_chat_hub
description: "Private Chat Hub - Universal AI chat platform for local, self-hosted, and cloud AI providers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  connectivity_plus: ^6.1.4
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_markdown: ^0.7.6+2
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.15
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
